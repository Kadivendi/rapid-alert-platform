server:
  port: 0

spring:
  application:
    name: sender
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      notifications:
        email: email-notification
        phone: phone-notification
        telegram: telegram-notification
        # Firebase Cloud Messaging push delivery.
        push: push-notification

services:
  notification: notification-service

notification:
  maxRetryAttempts: 3
  services:
    telegram:
      token: ${TELEGRAM_BOT_TOKEN}
    # Firebase Cloud Messaging configuration.
    # FIREBASE_CREDENTIALS_PATH must point at a Firebase service-account JSON
    # file mounted into the container; FIREBASE_PROJECT_ID is read from the
    # same file but can be overridden here for sandbox runs.
    fcm:
      credentialsPath: ${FIREBASE_CREDENTIALS_PATH:}
      projectId: ${FIREBASE_PROJECT_ID:}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    leaseRenewalIntervalInSeconds: 1
    leaseExpirationDurationInSeconds: 1
    metadataMap: # BUG: https://github.com/codecentric/spring-boot-admin/issues/134
      instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
