spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///template
    username: test
    password: test
  jpa:
    properties.hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    topics:
      template-update: template-updated-test
      recipient-update: recipient-updated-test

eureka:
  client:
    enabled: false
