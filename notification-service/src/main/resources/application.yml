server:
  port: 0

spring:
  application:
    name: notification-service
  datasource:
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${NOTIFICATION_DB_HOST:localhost}:${NOTIFICATION_DB_PORT:5432}/notification
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    partitions: 10
    topics:
      notifications:
        email: email-notification
        phone: phone-notification
        telegram: telegram-notification
        # Firebase Cloud Messaging push delivery; consumed by sender's FcmAlertService.
        push: push-notification
      splitter: recipient-list-splitter
      # Topic published by disaster-triage-engine after ML severity classification.
      # The TriageEventConsumer listens here and turns each result into a notification request.
      triage-events: rapid-alert.triage-events

services:
  recipient: recipient-service
  template: template-service
  shortener: url-shortener

springdoc:
  api-docs:
    path: /notification-service/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    leaseRenewalIntervalInSeconds: 1
    leaseExpirationDurationInSeconds: 1
    metadataMap: # BUG: https://github.com/codecentric/spring-boot-admin/issues/134
      instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
