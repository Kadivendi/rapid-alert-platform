server:
  port: 0

spring:
  application:
    name: security-service
  datasource:
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${SECURITY_DB_HOST:localhost}:${SECURITY_DB_PORT:5433}/security
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /security-service/api-docs

security:
  jwt:
    # JWT signing key MUST be provided via JWT_SIGNING_KEY in any deployed environment.
    # If unset, JwtService generates a per-boot random key and logs a WARN — useful for
    # local development, fatal for production (tokens invalidate on every restart).
    key: ${JWT_SIGNING_KEY:}
    prefix: 'Bearer '

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    leaseRenewalIntervalInSeconds: 1
    leaseExpirationDurationInSeconds: 1
    metadataMap: # BUG: https://github.com/codecentric/spring-boot-admin/issues/134
      instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
